class_names:
  0: "Humpback"
  1: "Orca"
  2: "Beluga"

multiclass: true

training:
  batch_size: 32
  num_workers: 4
  lr: 0.000288
  weight_decay: 0.0001
  epochs: 50
  backbone: "resnet34"
  num_classes: 3
  label_smoothing: 0.0
  target_size: [224, 180]
  x_col: "file_path"
  y_col: "label"
  normalize: true
  use_specaug: false