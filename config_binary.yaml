class_names:
  0: "No Whale"
  1: "Whale"

multiclass: false

training:
  batch_size: 32
  num_workers: 4
  lr: 0.000288
  weight_decay: 0.0001
  epochs: 50
  backbone: "resnet18"
  num_classes: 2
  label_smoothing: 0.0
  target_size: [224, 180]
  x_col: "file_path"
  y_col: "label"
  normalize: true
  use_specaug: false
