name: whales

datasets:
  - Humpback
  - Orca
  - Beluga

class_names:
  0: "No Whale"
  1: "Humpback"
  2: "Orca"
  3: "Beluga"

paths:
  data_root: "./data"
  output_root: "./outputs"
  spectrograms_dir: "/home/v-druizlopez/v-druizlopez/Bioacoustics/PW_Bioacustics/data/NOAA_Whales/mel_spectrograms_multiclass"
  windows_json: "/home/v-druizlopez/v-druizlopez/Bioacoustics/CookInlet_Belugas/data/NOAA_Whales/windows_multiclass_from_mels_corrected.json"

audio:
  sample_rate: 24000
  window_size_sec: 2.0
  overlap_sec: 0.4
  window_strategy: "sliding"
  negative_proportion: 0.5
  min_overlap_sec: 0.15
  multiclass: true

spectrogram:
  n_fft: 2048
  hop_length: 256
  n_mels: 224
  top_db: 80.0
  fill_highfreq: true
  noise_db_std: 3.0
  storage_dtype: "float32"

splits:
  test_size: 0.15
  val_size: 0.15
  n_splits: 5
  random_state: 42
